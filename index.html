            background: #000000;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #000000;
            overflow-x: hidden;
            position: relative;
            isolation: isolate;
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background:
                radial-gradient(circle at center, rgba(0, 0, 0, 0.86) 0%, rgba(0, 0, 0, 0.95) 58%, rgba(0, 0, 0, 0.99) 100%),
                url('https://cineby.io/fifab.jpg') no-repeat center center;
            background-size: cover;
            transform: translateZ(0);
        }
        body > * {
            position: relative;
            z-index: 1;
        }
        /* Custom scrollbar matching the premium dark interface */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #000000;
        }
        ::-webkit-scrollbar-thumb {
            background: #1f1f1f;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #2e2e2e;
        }
        .hero-shell {
            min-height: calc(100vh - 2rem);
        }
        @media (min-width: 768px) {
            .hero-shell {
                min-height: calc(100vh - 4rem);
            }
        }
        /* Hidden state for scroll trigger animations */
        .reveal-item {
            opacity: 0;
            transform: translateY(26px) scale(0.98);
            transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }
        /* Triggered active state */
        .reveal-item.active {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
        .hover\:scale-102:hover {
            transform: scale(1.02);
        }
        .future-match {
            position: relative;
        }
        .future-match::before {
            content: "";
            position: absolute;
            left: 50%;
            top: -1.35rem;
            width: 4px;
            height: 4px;
            border-radius: 9999px;
            background: rgba(255, 255, 255, 0.14);
            transform: translateX(-50%);
        }
        .future-match:first-child::before {
            display: none;
        }
        .hero-score-dash {
            color: rgba(115, 115, 115, 0.95);
        }
        .live-center-badge {
            min-width: 4.75rem;
        }
        .hero-live-score {

            'new zealand': 'nz',
            'norway': 'no',
            'panama': 'pa',
            'paraguay': 'py',
            'poland': 'pl',
            'portugal': 'pt',
            'qatar': 'qa',
            'saudi arabia': 'sa',
            'scotland': 'gb-sct',
            'senegal': 'sn',
            'south africa': 'za',
            'spain': 'es',
            'sweden': 'se',
            'switzerland': 'ch',
            'tunisia': 'tn',
            'turkiye': 'tr',
            'türkiye': 'tr',
            'turkey': 'tr',
            'united states': 'us',
            'usa': 'us',
            'united states of america': 'us',
            'uruguay': 'uy',
            'uzbekistan': 'uz'
        };

        function getCleanString(value) {
            if (value === null || value === undefined) return '';
            if (typeof value === 'object') {
                return getCleanString(value.name || value.name_en || value.country || value.title || value.full_name || value.short_name || value.en);
            }
            return String(value).replace(/\s+/g, ' ').trim();
        }

        function getJsonPayload(payload) {
            if (typeof payload !== 'string') return payload;
            const cleaned = payload.trim();
            if (!cleaned) return {};
            try {
                return JSON.parse(cleaned);
            } catch (error) {
                return {};
            }
        }

        function getClockDisplay(value) {
            const raw = getCleanString(value);
            if (!raw) return '';
            const upper = raw.toUpperCase();
            if (/^(HT|HALF\s*-?\s*TIME|HALFTIME)$/.test(upper)) return 'HT';
            if (/^(FT|FULL\s*-?\s*TIME|FULLTIME|FINAL)$/.test(upper)) return 'FT';
            const stoppage = raw.match(/(\d{1,3})\s*(?:'|’)?\s*\+\s*(\d{1,2})/);
            if (stoppage) return `${Number(stoppage[1])}+${Number(stoppage[2])}'`;
            const minute = raw.match(/(\d{1,3})/);
            if (minute) return `${Number(minute[1])}'`;
            return '';
        }

        function isUnknownTeam(name) {
            const value = getCleanString(name).toLowerCase();
            if (!value) return true;
            return /^(tbd|tbc|to be decided|to be confirmed|unknown|n\/a|-)$/.test(value)
                || /winner|runner-up|runner up|loser|match \d+|group [a-l]|third place|third-place|play-?off|slot|placeholder/.test(value)
                || /^[a-l][1234]$/.test(value);
        }

        function normalizeTeamName(name) {
            if (isUnknownTeam(name)) return '???';
            return getCleanString(name).toUpperCase();
        }

        function normalizeCountryKey(name) {
            return getCleanString(name)
                .toLowerCase()
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .replace(/&/g, 'and')
                .replace(/\./g, '')
                .replace(/\s+/g, ' ')
                .trim();
        }

        function normalizeFlagCode(code, teamName) {
            let raw = getCleanString(code).toLowerCase().trim();
            
            // Map common 3-letter codes to their 2-letter equivalents
            if (THREE_LETTER_CODES[raw]) {
                raw = THREE_LETTER_CODES[raw];
            }
            
            if (raw && raw !== 'tbd' && raw !== '???' && raw.length === 2) return raw;
            if (isUnknownTeam(teamName)) return 'tbd';
            
            const key = normalizeCountryKey(teamName);
            return COUNTRY_FLAG_CODES[key] || 'tbd';
        }

        function parseScoreValue(value) {
            if (value === null || value === undefined || value === '') return null;
            if (typeof value === 'number' && Number.isFinite(value)) return value;
            const raw = getCleanString(value);
            if (!raw || raw === '-') return null;
            const parsed = Number(raw.replace(/[^0-9.-]/g, ''));
            return Number.isFinite(parsed) ? parsed : null;
        }

        function parseMinuteValue(value) {
            const raw = getCleanString(value);
            if (!raw) return null;
            const match = raw.match(/(\d{1,3})/);
            if (!match) return null;
            const minute = Number(match[1]);
            return Number.isFinite(minute) ? minute : null;
        }

        function normalizeStatusValue(item) {
            return getCleanString(pickFirst(item, [
                'status', 'state', 'matchStatus', 'match_status', 'gameStatus', 'game_status',
                'status.type.state', 'status.type.name', 'status.type.description', 'status.type.detail',
                'status.description', 'status.detail', 'status.name', 'status.shortDetail'
            ])).toLowerCase();
        }

        function flagHTML(code, teamName, sizeClass = 'text-sm') {
            const finalCode = normalizeFlagCode(code, teamName);
            if (finalCode === 'tbd') {
                return `<span class="text-neutral-500 font-extrabold ${sizeClass} font-mono">?</span>`;
            }
            const safeCode = finalCode.replace(/[^a-z0-9-]/g, '');
            const safeName = escapeHTML(getCleanString(teamName) || 'Team');
            return `<img src="https://flagcdn.com/w320/${safeCode}.png" alt="${safeName} Flag" class="w-full h-full object-fill" loading="lazy" onerror="this.replaceWith(Object.assign(document.createElement('span'),{className:'text-neutral-500 font-extrabold ${sizeClass} font-mono',textContent:'?'}))">`;
        }

        function escapeHTML(value) {
            return getCleanString(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function pickFirst(obj, keys) {
            for (const key of keys) {
                if (!obj) continue;
                const value = key.split('.').reduce((acc, part) => acc && acc[part], obj);
                if (value !== undefined && value !== null && String(value).trim?.() !== '') return value;
            }
            return '';
        }

        function normalizeStage(stage, group) {
            const rawStage = getCleanString(stage);
            const groupValue = getCleanString(group).replace(/^group\s+/i, '').toUpperCase();
            const slug = rawStage.toLowerCase().replace(/_/g, '-');

            if (groupValue && /^[A-L]$/.test(groupValue)) return `FIFA World Cup • Group ${groupValue}`;
            if (slug.includes('group')) return 'FIFA World Cup • Group Stage';
            if (slug.includes('round-of-32') || slug.includes('round of 32')) return 'FIFA World Cup • Round of 32';
            if (slug.includes('round-of-16') || slug.includes('round of 16')) return 'FIFA World Cup • Round of 16';
            if (slug.includes('quarter')) return 'FIFA World Cup • Quarter-Final';
            if (slug.includes('semi')) return 'FIFA World Cup • Semi-Final';
            if (slug.includes('third')) return 'FIFA World Cup • Third Place';
            if (slug.includes('final')) return 'FIFA World Cup • World Cup Final';
            if (rawStage) return rawStage.startsWith('FIFA') ? rawStage : `FIFA World Cup • ${rawStage}`;
            return 'FIFA World Cup';
        }

        function normalizeKickoff(item) {
            const direct = pickFirst(item, [
                'kickoffUTC', 'kickoffUtc', 'kickoff_utc', 'utcKickoff', 'utc_kickoff', 'kickoff',
                'kickoffTime', 'kickoff_time', 'dateTime', 'datetime', 'startTime', 'start_time',
                'matchDate', 'match_date', 'gameDate', 'game_date', 'date'
            ]);
            const timeOnly = pickFirst(item, ['time', 'kickoffLocal', 'kickoff_local']);

            if (direct) {
                const raw = getCleanString(direct);
                if (/^\d{4}-\d{2}-\d{2}$/.test(raw) && timeOnly) {
                    const combined = `${raw}T${getCleanString(timeOnly).replace(/Z$/, '')}Z`;
                    const parsedCombined = new Date(combined);
                    if (!Number.isNaN(parsedCombined.getTime())) return parsedCombined.toISOString();
                }
                const parsed = new Date(raw);
                if (!Number.isNaN(parsed.getTime())) return parsed.toISOString();
            }

            const dateOnly = pickFirst(item, ['date', 'match_date', 'game_date']);
            if (dateOnly) {
                const parsed = new Date(`${getCleanString(dateOnly)}T00:00:00Z`);
                if (!Number.isNaN(parsed.getTime())) return parsed.toISOString();
            }

            return '';
        }

        function normalizeFixture(item, index = 0) {
            const homeRaw = pickFirst(item, ['homeTeam', 'home_team', 'home.name', 'home.name_en', 'homeTeam.name', 'homeTeam.name_en', 'team1', 'team_a', 'teamA', 'home']);
            const awayRaw = pickFirst(item, ['awayTeam', 'away_team', 'away.name', 'away.name_en', 'awayTeam.name', 'awayTeam.name_en', 'team2', 'team_b', 'teamB', 'away']);
            const kickoffUTC = normalizeKickoff(item);
            if (!kickoffUTC) return null;

            const matchNumber = getCleanString(pickFirst(item, ['matchNumber', 'match_number', 'number', 'game_number', 'id', '_id'])) || String(index + 1);
            const group = pickFirst(item, ['group', 'groupName', 'group_name', 'groups']);
            const stage = normalizeStage(pickFirst(item, ['stage', 'round', 'roundName', 'round_name', 'phase', 'type']), group);
            const venue = getCleanString(pickFirst(item, ['stadium', 'venue', 'location', 'stadium.name', 'stadium_name', 'place', 'venue.fullName'])) || '???';
            const homeScore = parseScoreValue(pickFirst(item, ['homeScore', 'home_score', 'home.score', 'homeTeam.score', 'score.home', 'scores.home', 'homeGoals', 'home_goals']));
            const awayScore = parseScoreValue(pickFirst(item, ['awayScore', 'away_score', 'away.score', 'awayTeam.score', 'score.away', 'scores.away', 'awayGoals', 'away_goals']));
            const clockRaw = pickFirst(item, ['clockDisplay', 'clock_display', 'displayClock', 'status.displayClock', 'status.clock', 'minute', 'matchMinute', 'match_minute', 'elapsed', 'clock', 'timeElapsed']);
            const minute = parseMinuteValue(clockRaw);
            const status = normalizeStatusValue(item);

            return {
                id: `match-${matchNumber}`.replace(/[^a-zA-Z0-9_-]/g, '-'),
                matchNumber,
                stage,
                homeTeam: getCleanString(homeRaw),
                homeFlag: normalizeFlagCode(pickFirst(item, ['homeFlag', 'home_flag', 'home.code', 'home.fifa_code', 'homeTeam.code', 'homeTeam.fifa_code', 'homeTeamCode', 'home_team_code']), homeRaw),
                awayTeam: getCleanString(awayRaw),
                awayFlag: normalizeFlagCode(pickFirst(item, ['awayFlag', 'away_flag', 'away.code', 'away.fifa_code', 'awayTeam.code', 'awayTeam.fifa_code', 'awayTeamCode', 'away_team_code']), awayRaw),
                kickoffUTC,
                venue,
                homeScore,
                awayScore,
                minute,
                clockDisplay: getClockDisplay(clockRaw),
                hasRealScore: homeScore !== null && awayScore !== null,
                hasRealClock: !!getClockDisplay(clockRaw),
                status
            };
        }

        // Modified: A match is live if current time is equal or past the kickoff but not finished
        function isLiveMatch(match, now = Date.now()) {
            if (!match || isFinishedMatch(match, now)) return false;
            const kickoff = new Date(match.kickoffUTC).getTime();
            if (!Number.isFinite(kickoff)) return false;
            return statusLooksLive(match.status) || now >= kickoff;
        }

        function getDisplayScore(value) {
            const parsed = parseScoreValue(value);
            return parsed === null ? '—' : String(parsed);
        }

        function formatLiveMinute(match) {
            if (!match) return '';
            if (match.clockDisplay) return match.clockDisplay;
            if (statusLooksLive(match.status) && /half/.test(match.status || '')) return 'HT';
            const minute = parseMinuteValue(match.minute);
            return minute ? `${minute}'` : 'LIVE';
        }

        function selectSpotlightMatch(fixtures) {
            const now = Date.now();
            const visible = fixtures
                .filter((match) => match && match.kickoffUTC && !isFinishedMatch(match, now))
                .sort((a, b) => new Date(a.kickoffUTC) - new Date(b.kickoffUTC));
            const live = visible.filter((match) => isLiveMatch(match, now));
            return live[0] || visible.find((match) => new Date(match.kickoffUTC).getTime() > now) || fixtures[0] || null;
        }

        function renderHeroFlag(elementId, match, side) {
            const el = document.getElementById(elementId);
            const teamName = side === 'home' ? match.homeTeam : match.awayTeam;
            const flagCode = side === 'home' ? match.homeFlag : match.awayFlag;
            if (!el) return;
            el.innerHTML = flagHTML(flagCode, teamName, 'text-2xl');
        }

        function setHeroCenter(match) {
            const center = document.getElementById('hero-center-badge');
            const timer = document.getElementById('hero-timer');
            const label = document.getElementById('hero-status-label');
            if (!center || !timer || !label) return;

            if (isLiveMatch(match)) {
                const homeScore = getDisplayScore(match.homeScore);
                const awayScore = getDisplayScore(match.awayScore);
                const minute = formatLiveMinute(match);
                label.innerText = 'LIVE';
                timer.style.display = 'none';
                center.classList.add('live-center-badge');
                center.innerHTML = `
                    <div class="hero-live-score flex flex-col items-center leading-none">

                            <span class="text-xl md:text-3xl font-black tracking-tight hero-score-dash">-</span>
                            <span class="text-2xl md:text-4xl font-black tracking-tight text-white">${escapeHTML(awayScore)}</span>
                        </div>
                        <span class="text-[12px] md:text-sm font-black text-red-500/80 uppercase tracking-widest mt-2">${escapeHTML(minute)}</span>
                    </div>
                `;
            } else {
                label.innerText = 'NEXT MATCH';
                timer.style.display = 'flex';
                center.classList.remove('live-center-badge');
                center.innerHTML = '<span class="text-[11px] font-black tracking-widest text-neutral-500 uppercase">VS</span>';
            }
        }

        function setHeroMatch(match) {
            if (!match) return;

            activeMatchObj = match;
            heroMatchId = match.id;
            heroKickoff = new Date(match.kickoffUTC);

            document.getElementById('hero-home-name').innerText = normalizeTeamName(match.homeTeam);
            document.getElementById('hero-away-name').innerText = normalizeTeamName(match.awayTeam);
            document.getElementById('hero-stage').innerText = match.stage || 'FIFA World Cup';
            document.getElementById('hero-date').innerText = heroKickoff.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
            document.getElementById('hero-time').innerText = heroKickoff.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' }) + ' ' + heroKickoff.toLocaleTimeString(undefined, { timeZoneName: 'short' }).split(' ').pop();
            document.getElementById('hero-venue').innerText = match.venue || '???';

            renderHeroFlag('hero-home-flag', match, 'home');
            renderHeroFlag('hero-away-flag', match, 'away');
            setHeroCenter(match);
            runMainCountdown();
        }

        function applySchedule(fixtures) {
            matchesData = fixtures
                .filter((match) => match && match.kickoffUTC)
                .sort((a, b) => new Date(a.kickoffUTC) - new Date(b.kickoffUTC));

            const heroMatch = selectSpotlightMatch(matchesData);
            if (heroMatch) setHeroMatch(heroMatch);
            renderTimeline();
        }

        const scrollObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, {
            threshold: 0.12,
            rootMargin: '0px 0px -40px 0px'
        });

        function renderTimeline() {
            scheduleContainer.innerHTML = '';

            const now = Date.now();
            const upcomingMatches = matchesData
                .filter((match) => match.id !== heroMatchId)
                .filter((match) => !isFinishedMatch(match, now))
                .sort((a, b) => new Date(a.kickoffUTC) - new Date(b.kickoffUTC));

            upcomingMatches.forEach((match) => {
                const dateUTC = new Date(match.kickoffUTC);
                const sameDay = dateUTC.toDateString() === new Date().toDateString();
                const live = isLiveMatch(match, now);

                let matchTimeHTML = '';
                if (live) {
                    matchTimeHTML = `
                        <div class="flex items-center gap-1.5 font-bold text-red-500 bg-red-500/10 px-3 py-1 rounded-full border border-red-500/20">
                            <span class="w-1 h-1 bg-red-500 rounded-full animate-pulse"></span>
                            <span class="text-[10px] font-black tracking-widest">LIVE</span>
                            <span class="text-xs font-mono tracking-wider text-red-500/80">${escapeHTML(formatLiveMinute(match))}</span>
                        </div>
                    `;
                } else if (sameDay && dateUTC.getTime() > now) {
                    matchTimeHTML = `
                        <div class="flex items-center gap-1.5 font-bold text-red-500 animate-pulse bg-red-500/10 px-3 py-1 rounded-full border border-red-500/20">
                            <span id="countdown-ticker-${escapeHTML(match.id)}" class="text-[10px] font-mono tracking-wider">00:00:00</span>
                        </div>
                    `;
                } else {
                    matchTimeHTML = `
                        <span class="text-[10px] font-semibold text-neutral-400 select-none uppercase tracking-widest">
                            ${escapeHTML(formatMatchDate(dateUTC))}
                        </span>
                    `;
                }

                const centerHTML = live
                    ? `<div class="flex flex-col items-center leading-none">
                            <div class="flex items-center gap-1.5 md:gap-2">
                                <span class="text-base md:text-lg font-black text-white">${escapeHTML(getDisplayScore(match.homeScore))}</span>
                                <span class="text-sm md:text-base font-black hero-score-dash">-</span>
                                <span class="text-base md:text-lg font-black text-white">${escapeHTML(getDisplayScore(match.awayScore))}</span>
                            </div>
                            <span class="text-[10px] md:text-xs font-black text-red-500/70 mt-1 tracking-wider">${escapeHTML(formatLiveMinute(match))}</span>
                        </div>`
                    : '<span class="text-[9px] font-black tracking-widest text-neutral-600 uppercase">VS</span>';

                const item = document.createElement('div');
                item.id = match.id;
                item.className = 'future-match reveal-item w-full flex flex-col items-center text-center py-1';

                item.innerHTML = `
                    <!-- Match Metadata Details Block -->
                    <div class="flex flex-col items-center gap-2 mb-5">
                        <span class="text-[9px] font-extrabold text-neutral-500 uppercase tracking-[0.25em]">${escapeHTML(match.stage)}</span>
                        <div class="flex flex-col md:flex-row items-center gap-2 md:gap-3 text-[10px] text-neutral-600 font-medium">
                            ${matchTimeHTML}
                            <span class="hidden md:inline text-neutral-800">•</span>
                            <span class="flex items-center gap-1"><i data-lucide="map-pin" class="w-3 h-3 text-neutral-700"></i> ${escapeHTML(match.venue)}</span>
                        </div>
                    </div>

                    <!-- Dynamic Teams Row -->
                    <div class="relative flex justify-center items-start w-full max-w-lg px-4">
                        <!-- Left Side: Home Team -->
                        <div class="flex flex-col items-center w-1/2 pr-3 md:pr-4">
                            <div class="w-20 md:w-28 aspect-[3/2] shadow-[0_15px_30px_rgba(0,0,0,0.85)] border border-white/10 overflow-hidden flex items-center justify-center bg-neutral-950">
                                ${flagHTML(match.homeFlag, match.homeTeam)}
                            </div>
                            <h3 class="text-[11px] md:text-sm font-extrabold tracking-wide text-neutral-300 uppercase select-none mt-3 whitespace-nowrap overflow-hidden text-ellipsis w-full">
                                ${escapeHTML(normalizeTeamName(match.homeTeam))}
                            </h3>
                        </div>

                        <!-- Splitter VS / Live Score -->
                        <div class="absolute left-1/2 top-[28px] md:top-[38px] -translate-x-1/2 -translate-y-1/2 z-10 select-none px-2 py-0.5">
                            ${centerHTML}
                        </div>

                        <!-- Right Side: Away Team -->
                        <div class="flex flex-col items-center w-1/2 pl-3 md:pl-4">
                            <div class="w-20 md:w-28 aspect-[3/2] shadow-[0_15px_30px_rgba(0,0,0,0.85)] border border-white/10 overflow-hidden flex items-center justify-center bg-neutral-950">
                                ${flagHTML(match.awayFlag, match.awayTeam)}
                            </div>
                            <h3 class="text-[11px] md:text-sm font-extrabold tracking-wide text-neutral-300 uppercase select-none mt-3 whitespace-nowrap overflow-hidden text-ellipsis w-full">
                                ${escapeHTML(normalizeTeamName(match.awayTeam))}

                        </div>
                    </div>
                `;

                scheduleContainer.appendChild(item);
                scrollObserver.observe(item);
            });

            if (window.lucide) lucide.createIcons();
        }

        function updateTimerElement(id, value, isDimmed) {
            const el = document.getElementById(id);
            if (!el) return;

            el.innerText = value;
            el.className = isDimmed
                ? 'text-3xl md:text-4xl font-black text-neutral-500 tracking-tight leading-none transition-all duration-300'
                : 'text-4xl md:text-5xl font-black text-white tracking-tight leading-none transition-all duration-300';
        }

        function runMainCountdown() {
            if (!heroKickoff) return;

            const heroMatch = matchesData.find((match) => match.id === heroMatchId);
            if (heroMatch && isLiveMatch(heroMatch)) return;

            const now = Date.now();
            let delta = Math.floor((heroKickoff.getTime() - now) / 1000);

            if (delta <= 0) {
                updateTimerElement('days', '00', true);
                updateTimerElement('hours', '00', true);
                updateTimerElement('minutes', '00', true);
                updateTimerElement('seconds', '00', true);
                if (heroMatch) setHeroCenter(heroMatch);
                return;
            }

            const days = Math.floor(delta / 86400);
            const hrs = Math.floor((delta % 86400) / 3600);
            const mins = Math.floor((delta % 3600) / 60);
            const secs = delta % 60;

            updateTimerElement('days', String(days).padStart(2, '0'), days === 0);
            updateTimerElement('hours', String(hrs).padStart(2, '0'), delta < 3600);
            updateTimerElement('minutes', String(mins).padStart(2, '0'), delta < 60);
            updateTimerElement('seconds', String(secs).padStart(2, '0'), delta <= 0);
        }

        function runSecondaryTickers() {
            const now = Date.now();
            matchesData.forEach(match => {
                const el = document.getElementById(`countdown-ticker-${match.id}`);
                if (!el) return;

                const kickoff = new Date(match.kickoffUTC);
                let delta = Math.floor((kickoff.getTime() - now) / 1000);

                if (delta <= 0) {
                    el.innerText = '00:00:00';
                    return;
                }

                const hrs = Math.floor((delta % 86400) / 3600);
                const mins = Math.floor((delta % 3600) / 60);
                const secs = delta % 60;

                el.innerText = `${String(hrs).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
            });
        }

        function globalClockTick() {
            if (matchesData.length) {
                const currentHero = matchesData.find((match) => match.id === heroMatchId);
                if (currentHero) {
                    if (isFinishedMatch(currentHero)) {
                        // Match finished, dynamically target the next spotlight game
                        const nextHero = selectSpotlightMatch(matchesData);
                        if (nextHero && nextHero.id !== heroMatchId) {
                            setHeroMatch(nextHero);
                        }
                    } else {
                        setHeroCenter(currentHero);
                    }
                }
            }

            runMainCountdown();
            runSecondaryTickers();
        }

                </span>

        function makeServerOptionHTML(chan) {

                    <div class="flex items-center gap-1.5 min-w-0">

                        <span class="text-neutral-500 font-medium shrink-0">|</span>

        }

        function populateCustomDropdown() {
            dropdownOptions.innerHTML = '';
            SERVER_CHANNELS.forEach(chan => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left px-4 py-2.5 hover:bg-white/5 active:bg-white/10 transition-colors flex items-center justify-between gap-2 border-b border-white/5 last:border-b-0";
                btn.innerHTML = makeServerOptionHTML(chan);
                
                btn.addEventListener('click', () => {
                    selectServer(chan);
                    toggleDropdown(false);
                });
                
                dropdownOptions.appendChild(btn);
            });
        }

        function selectServer(chan) {
            if (!activeMatchObj) return;

            const homeSlug = normalizeCountryKey(activeMatchObj.homeTeam).replace(/\s+/g, '-');
            const awaySlug = normalizeCountryKey(activeMatchObj.awayTeam).replace(/\s+/g, '-');

            let finalURL = "";
            if (chan.type === "admin") {
                // Arabic beIN, French TF1, German ZDF etc.
                finalURL = `${STREAM_BASE_URL_ADMIN}${homeSlug}-vs-${awaySlug}/${chan.server}`;
            } else {
                // original English feeds (uses exact delta parameters for the primary game)
                const isDefaultMatch = (homeSlug.includes("united-states") || homeSlug.includes("usa")) && awaySlug.includes("australia");
                if (isDefaultMatch) {
                    finalURL = `${STREAM_BASE_URL_DELTA}${chan.server}`;
                } else {
                    finalURL = `${STREAM_BASE_URL_ADMIN}${homeSlug}-vs-${awaySlug}/${chan.server}`;
                }
            }

            // Set source safely
            videoFrame.src = finalURL;
            
            // Re-render trigger display
            currentActiveSelection.innerHTML = makeTriggerDisplayHTML(chan);

            // Update viewer count
            streamViewersCount.innerText = chan.viewers;
        }

        // Animate the dropdown opening smoothly
        function toggleDropdown(show) {
            if (show) {
                dropdownOptions.classList.remove('hidden');
                dropdownChevron.classList.add('rotate-180');
                
                // Allow browser to render layout first, then apply animations
                requestAnimationFrame(() => {
                    dropdownOptions.classList.remove('opacity-0', 'scale-95', 'translate-y-2');
                    dropdownOptions.classList.add('opacity-100', 'scale-100', 'translate-y-0');
                });
            } else {
                dropdownChevron.classList.remove('rotate-180');
                dropdownOptions.classList.remove('opacity-100', 'scale-100', 'translate-y-0');
                dropdownOptions.classList.add('opacity-0', 'scale-95', 'translate-y-2');
                
                // Set hidden after the animation ends
                setTimeout(() => {
                    if (dropdownOptions.classList.contains('opacity-0')) {
                        dropdownOptions.classList.add('hidden');
                    }
                }, 150);
            }
        }

        // Click handler with explicit toggles
        dropdownTrigger.addEventListener('click', (e) => {
            e.stopPropagation();
            const isOpen = !dropdownOptions.classList.contains('hidden') && dropdownOptions.classList.contains('opacity-100');
            toggleDropdown(!isOpen);
        });

        // Close on escape or when clicking outside
        document.addEventListener('click', (e) => {
            if (!dropdownContainer.contains(e.target)) {
                toggleDropdown(false);
            }
        });

        function enterStreamingTheater() {
            if (!activeMatchObj) return;

            // Setup dynamic options
            populateCustomDropdown();

            // Setup matchup title at the top header
            const home = normalizeTeamName(activeMatchObj.homeTeam);
            const away = normalizeTeamName(activeMatchObj.awayTeam);
            streamMatchTitle.innerText = `${home} VS ${away}`;

            // Default to English Live Feed (HD) (Server 1)
            const defaultChan = SERVER_CHANNELS[0];
            selectServer(defaultChan);

            // View transitions
            mainLobby.classList.add('hidden');
            streamTheater.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function exitStreamingTheater() {
            // Cut Iframe memory leak
            videoFrame.src = "about:blank";

            streamTheater.classList.add('hidden');
            mainLobby.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Parse schedules with robust try-catch blocks
        function parseStatsApiFixtures(payload) {
            const data = getJsonPayload(payload);
            const list = Array.isArray(data) ? data : (data.fixtures || data.data || data.matches || []);
            return list.map(normalizeFixture).filter(Boolean);
        }

        function parseGenericJsonFixtures(payload) {
            const data = getJsonPayload(payload);
            const list = Array.isArray(data) ? data : (data.fixtures || data.data || data.matches || data.games || data.items || data.results || []);
            return list.map(normalizeFixture).filter(Boolean);
        }

        function parseGenericCsvFixtures(text) {
            const rows = parseCsv(text);
            if (rows.length < 2) return [];
            const headers = rows[0].map((header) => header.trim().replace(/\s+/g, '_'));
            const objects = rows.slice(1).map((row) => {
                const item = {};
                headers.forEach((header, index) => {
                    item[header] = row[index] || '';
                });
                return item;
            });
            return objects.map(normalizeFixture).filter(Boolean);
        }

        function parseCsv(text) {
            const rows = [];
            let cell = '';
            let row = [];
            let quoted = false;

            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const next = text[i + 1];

                if (char === '"' && quoted && next === '"') {
                    cell += '"';
                    i++;
                } else if (char === '"') {
                    quoted = !quoted;
                } else if (char === ',' && !quoted) {
                    row.push(cell);
                    cell = '';
                } else if ((char === '\n' || char === '\r') && !quoted) {
                    if (char === '\r' && next === '\n') i++;
                    row.push(cell);
                    if (row.some((value) => value.trim() !== '')) rows.push(row);
                    cell = '';
                    row = [];
                } else {
                    cell += char;
                }
            }

            if (cell || row.length) {
                row.push(cell);
                if (row.some((value) => value.trim() !== '')) rows.push(row);
            }

            return rows;
        }

        function parseEspnScoreboard(payload) {
            const data = getJsonPayload(payload);
            const events = Array.isArray(data.events) ? data.events : [];
            return events.map((event, index) => {
                const competition = event.competitions?.[0] || {};
                const competitors = Array.isArray(competition.competitors) ? competition.competitors : [];
                const home = competitors.find((team) => team.homeAway === 'home') || competitors[0] || {};
                const away = competitors.find((team) => team.homeAway === 'away') || competitors[1] || {};
                const homeTeam = home.team?.displayName || home.team?.name || home.team?.shortDisplayName || home.team?.abbreviation || '';
                const awayTeam = away.team?.displayName || away.team?.name || away.team?.shortDisplayName || away.team?.abbreviation || '';
                const statusType = event.status?.type || {};
                const clockDisplay = getClockDisplay(event.status?.displayClock || statusType.detail || statusType.shortDetail);
                const rawStatus = [statusType.state, statusType.name, statusType.description, statusType.detail, statusType.shortDetail, event.status?.displayClock].filter(Boolean).join(' ');
                const venue = competition.venue?.fullName || competition.venue?.address?.city || event.venue?.fullName || '???';
                const groupName = event.group?.shortName || event.group?.name || event.league?.name || '';

                return {
                    id: `espn-${event.id || index}`,
                    matchNumber: event.id || `espn-${index + 1}`,
                    stage: normalizeStage(groupName || event.season?.slug || 'FIFA World Cup', groupName),
                    homeTeam,
                    homeFlag: normalizeFlagCode(home.team?.abbreviation || home.team?.countryFlag?.split('/').pop()?.split('.')[0], homeTeam),
                    awayTeam,
                    awayFlag: normalizeFlagCode(away.team?.abbreviation || away.team?.countryFlag?.split('/').pop()?.split('.')[0], awayTeam),
                    kickoffUTC: event.date ? new Date(event.date).toISOString() : '',
                    venue,
                    homeScore: parseScoreValue(home.score),
                    awayScore: parseScoreValue(away.score),
                    minute: parseMinuteValue(event.status?.displayClock || statusType.detail || statusType.shortDetail),
                    clockDisplay,
                    hasRealScore: parseScoreValue(home.score) !== null && parseScoreValue(away.score) !== null,
                    hasRealClock: !!clockDisplay,
                    liveSource: 'espn-scoreboard',
                    status: rawStatus.toLowerCase()
                };
            }).filter((match) => match.kickoffUTC);
        }

        async function fetchEspnScoreboards() {
            const today = new Date();
            const dates = [-1, 0, 1, 2].map((offset) => {
                const day = new Date(today);
                day.setDate(today.getDate() + offset);
                return formatEspnDate(day);
            });
            const urls = dates.map((date) => `https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=${date}&limit=100`);
            const results = await Promise.allSettled(urls.map((url) => fetchWithTimeout(url, 6500)));
            return results.flatMap((result) => result.status === 'fulfilled' ? parseEspnScoreboard(result.value) : []);
        }

        async function fetchLiveFixtures() {
            const all = [];
            for (const source of LIVE_SCORE_SOURCES) {
                try {
                    const fixtures = source.loader
                        ? await source.loader()
                        : source.parser(await fetchWithTimeout(source.url, 6500));
                    if (Array.isArray(fixtures) && fixtures.length) {
                        all.push(...fixtures.map((match) => ({ ...match, liveSource: match.liveSource || source.name })));
                    }
                } catch (error) {
                    // Silent fallback
                }
            }
            return all.filter((match) => match && match.kickoffUTC);
        }

        function isFinishedMatch(match, now = Date.now()) {
            if (!match || !match.kickoffUTC) return true;
            if (statusLooksFinished(match.status)) return true;
            const kickoff = new Date(match.kickoffUTC).getTime();
            if (!Number.isFinite(kickoff)) return true;
            return now > kickoff + fallbackMatchDurationMs(match);
        }



        // ===== REQUIRED HELPERS THAT WERE MISSING =====
        // Your page was stopping here because refreshLiveData() did not exist.
        function statusLooksLive(status) {
            const raw = getCleanString(status).toLowerCase();
            if (!raw) return false;
            return /\b(live|in|in progress|first half|second half|1st half|2nd half|halftime|half time|ht|extra time|penalties?)\b/.test(raw)
                && !statusLooksFinished(raw);
        }

        function statusLooksFinished(status) {
            const raw = getCleanString(status).toLowerCase();
            if (!raw) return false;
            return /\b(ft|full time|full-time|final|finished|ended|complete|completed|post|postponed|cancelled|canceled|abandoned)\b/.test(raw);
        }

        function fallbackMatchDurationMs(match) {
            const stage = getCleanString(match?.stage).toLowerCase();
            return /(round|quarter|semi|final|knockout|third)/.test(stage)
                ? KNOCKOUT_FALLBACK_MS
                : GROUP_STAGE_FALLBACK_MS;
        }

        function formatEspnDate(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}${m}${d}`;
        }

        function formatMatchDate(date) {
            return date.toLocaleString(undefined, {
                weekday: 'short',
                month: 'short',
                day: 'numeric',
                hour: 'numeric',
                minute: '2-digit'
            });
        }

        async function fetchWithTimeout(url, timeoutMs = 10000) {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), timeoutMs);
            try {
                const res = await fetch(url, {
                    signal: controller.signal,
                    cache: 'no-store',
                    mode: 'cors'
                });
                if (!res.ok) throw new Error(`Fetch failed ${res.status}: ${url}`);
                return await res.text();
            } finally {
                clearTimeout(timeout);
            }
        }

        function teamKey(name) {
            return normalizeCountryKey(name)
                .replace(/^(the\s+)/, '')
                .replace(/united states of america|united states|usa/g, 'us')
                .replace(/cote divoire|côte divoire|ivory coast/g, 'ivory-coast')
                .replace(/\s+/g, '-');
        }

        function sameTeams(a, b) {
            const ah = teamKey(a.homeTeam);
            const aa = teamKey(a.awayTeam);
            const bh = teamKey(b.homeTeam);
            const ba = teamKey(b.awayTeam);
            return (ah && aa && ah === bh && aa === ba) || (ah && aa && ah === ba && aa === bh);
        }

        function closeKickoff(a, b, maxDiffMs = 36 * 60 * 60 * 1000) {
            const at = new Date(a.kickoffUTC).getTime();
            const bt = new Date(b.kickoffUTC).getTime();
            if (!Number.isFinite(at) || !Number.isFinite(bt)) return false;
            return Math.abs(at - bt) <= maxDiffMs;
        }

        function mergeLiveIntoBase(base, live) {
            if (!Array.isArray(live) || !live.length) return base;
            const merged = base.map((baseMatch) => {
                const liveMatch = live.find((item) => sameTeams(baseMatch, item) && closeKickoff(baseMatch, item));
                if (!liveMatch) return baseMatch;
                return {
                    ...baseMatch,
                    homeScore: liveMatch.homeScore ?? baseMatch.homeScore,
                    awayScore: liveMatch.awayScore ?? baseMatch.awayScore,
                    minute: liveMatch.minute ?? baseMatch.minute,
                    clockDisplay: liveMatch.clockDisplay || baseMatch.clockDisplay,
                    hasRealScore: liveMatch.hasRealScore || baseMatch.hasRealScore,
                    hasRealClock: liveMatch.hasRealClock || baseMatch.hasRealClock,
                    status: liveMatch.status || baseMatch.status,
                    liveSource: liveMatch.liveSource || baseMatch.liveSource
                };
            });

            // Keep live-only games if an API returns one missing from the base schedule.
            live.forEach((liveMatch) => {
                const alreadyExists = merged.some((baseMatch) => sameTeams(baseMatch, liveMatch) && closeKickoff(baseMatch, liveMatch));
                if (!alreadyExists) merged.push(liveMatch);
            });

            return merged;
        }

        async function refreshLiveData() {
            const safeBase = Array.isArray(baseFixtures) && baseFixtures.length ? baseFixtures : MOCK_FIXTURES;
            let liveFixtures = [];
            try {
                liveFixtures = await fetchLiveFixtures();
            } catch (error) {
                liveFixtures = [];
            }

            const merged = mergeLiveIntoBase(safeBase, liveFixtures);
            applySchedule(merged.length ? merged : safeBase);
        }

        function startLiveRefresh() {
            if (liveRefreshStarted) return;
            liveRefreshStarted = true;
            setInterval(refreshLiveData, LIVE_REFRESH_MS);
        }

        async function fetchLiveWorldCupSchedule() {
            let success = false;
            for (const source of REAL_SCHEDULE_SOURCES) {
                try {
                    const payload = await fetchWithTimeout(source.url);
                    const fixtures = source.parser(payload)
                        .filter((match) => match && match.kickoffUTC)
                        .sort((a, b) => new Date(a.kickoffUTC) - new Date(b.kickoffUTC));

                    if (fixtures.length > 0) {
                        baseFixtures = fixtures;
                        success = true;
                        break;
                    }
                } catch (error) {
                    // Silent fallback
                }
            }

            // Fallback securely to Mock matches if network requests are blocked by CORS/offline
            if (!success || baseFixtures.length === 0) {
                baseFixtures = MOCK_FIXTURES;
            }

            await refreshLiveData();
            startLiveRefresh();
        }

        // Action Bindings
        watchLiveBtn.addEventListener('click', enterStreamingTheater);
        streamBackBtn.addEventListener('click', exitStreamingTheater);

        setInterval(globalClockTick, 1000);
        globalClockTick();
        fetchLiveWorldCupSchedule();
    </script>
